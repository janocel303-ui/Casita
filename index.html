<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casita</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #f5efe6;
      --warm:    #e8d9c4;
      --clay:    #c07850;
      --clay2:   #a05c36;
      --dark:    #1a110a;
      --smoke:   #6b5744;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Fondo texturizado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(192,120,80,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(192,120,80,0.10) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Techo decorativo */
    .roof {
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 72px solid var(--clay);
      filter: drop-shadow(0 -4px 18px rgba(192,120,80,0.35));
      animation: fadeUp 0.9s 0.05s cubic-bezier(.22,1,.36,1) both;
      position: relative;
    }

    .roof::after {
      content: '';
      position: absolute;
      top: 20px;
      left: -90px;
      width: 0;
      height: 0;
      border-left: 90px solid transparent;
      border-right: 90px solid transparent;
      border-bottom: 60px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .card {
      background: var(--cream);
      width: 340px;
      padding: 44px 40px 36px;
      border-radius: 0 0 18px 18px;
      text-align: center;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.55),
        0 0 0 1px rgba(192,120,80,0.25);
      animation: fadeUp 0.9s 0.1s cubic-bezier(.22,1,.36,1) both;
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--clay);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 44px;
      font-weight: 600;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--smoke);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 32px;
      margin-top: 10px;
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--clay), transparent);
      margin: 0 auto 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 10px;
      background: var(--clay);
      color: var(--cream);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(192,120,80,0.35);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn:hover {
      background: var(--clay2);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(192,120,80,0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      flex-shrink: 0;
      opacity: 0.9;
    }

    .footer {
      margin-top: 22px;
      font-size: 10.5px;
      color: var(--smoke);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: 0.7;
    }

    .footer::before, .footer::after {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--smoke);
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="roof"></div>

    <div class="card">
      <div class="label">Archivo transportable</div>

      <h1>Casita</h1>

      <p class="subtitle">
        Descargá el archivo comprimido<br>desde Google Drive
      </p>

      <div class="divider"></div>

      <a
        class="btn"
        href="https://drive.google.com/file/d/1QICE6Ul6NFOU51q_D5ivXBVI83YW24H_/view?usp=drivesdk"
        target="_blank"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Descargar
      </a>

      <div class="footer">Alojado en Google Drive</div>
    </div>
  </div>

</body>
</html>
